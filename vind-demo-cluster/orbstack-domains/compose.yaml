services:
  vind-local-domains:
    image: caddy:2.10.2
    restart: unless-stopped
    labels:
      dev.orbstack.domains: ${ARGOCD_HOST},${VCP_HOST},${FORGEJO_HOST}
    environment:
      VCP_HOST: ${VCP_HOST}
      ARGOCD_HOST: ${ARGOCD_HOST}
      FORGEJO_HOST: ${FORGEJO_HOST}
      VCP_UPSTREAM: ${VCP_UPSTREAM}
      ARGOCD_UPSTREAM: ${ARGOCD_UPSTREAM}
      FORGEJO_UPSTREAM: ${FORGEJO_UPSTREAM}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - vind

networks:
  vind:
    external: true
    name: ${VIND_DOCKER_NETWORK}
