# Use vCluster CLI 0.32.1 when creating or upgrading this vind cluster.
# The vCluster version is determined by the CLI release, while this file pins
# the Kubernetes distro and the bootstrap add-on chart versions.
# Treat this file as a template. Use install-vind.sh or
# bootstrap-self-contained.sh to render the placeholders before creating vind.
# The install helper renders the placeholders below:
# - __VCP_PLATFORM_VERSION__
# - __VCP_LICENSE_TOKEN__
# - __VCP_LOFT_HOST__
# - __VCP_DOMAIN_PREFIX__
# - __VCP_DOMAIN__
# - __FORGEJO_HOST__
# - __FORGEJO_ADMIN_USER__
# - __FORGEJO_ADMIN_PASSWORD__
# - worker node list for `experimental.docker.nodes`
controlPlane:
  distro:
    k8s:
      image:
        tag: v1.35.1

experimental:
  docker:
    nodes:
__VIND_DOCKER_NODES__
  deploy:
    vcluster:
      manifests: |-
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd
        ---
        apiVersion: v1
        kind: Namespace
        metadata:
          name: eso
        ---
        apiVersion: v1
        kind: Namespace
        metadata:
          name: vcluster-platform
        ---
        apiVersion: v1
        kind: Namespace
        metadata:
          name: crossplane-system
        ---
        apiVersion: v1
        kind: Namespace
        metadata:
          name: forgejo
        ---
        apiVersion: v1
        kind: Secret
        metadata:
          name: forgejo-admin-secret
          namespace: forgejo
        type: Opaque
        stringData:
          username: __FORGEJO_ADMIN_USER__
          password: __FORGEJO_ADMIN_PASSWORD__
        ---
        apiVersion: v1
        kind: Secret
        metadata:
          name: cluster-local
          namespace: argocd
          annotations:
            domainPrefix: __VCP_DOMAIN_PREFIX__
            domain: __VCP_DOMAIN__
          labels:
            argocd.argoproj.io/secret-type: cluster
            crossplane: "false"
            eso: "true"
            flux: "false"
            kyverno: "false"
            loftDemoDomain: __VCP_LOFT_HOST__
            domainPrefix: __VCP_DOMAIN_PREFIX__
            domain: __VCP_DOMAIN__
            mysql: "false"
            postgres: "false"
            rancher: "false"
            resolveDNS: "false"
            virtualScheduler: "false"
            vnode: "false"
        type: Opaque
        stringData:
          config: '{"tlsClientConfig":{"insecure":false}}'
          name: in-cluster
          server: https://kubernetes.default.svc
      helm:
        - chart:
            name: argo-cd
            repo: https://argoproj.github.io/argo-helm
            version: 9.4.7
          release:
            name: argocd
            namespace: argocd
          timeout: 10m
          values: |-
            crds:
              install: true
            configs:
              cm:
                application.resourceTrackingMethod: annotation
                kustomize.buildOptions: --load-restrictor LoadRestrictionsNone
              params:
                server.insecure: true
            server:
              extraArgs:
                - --insecure
              ingress:
                enabled: false
              service:
                type: LoadBalancer
        - chart:
            name: external-secrets
            repo: https://charts.external-secrets.io
            version: 2.1.0
          release:
            name: eso
            namespace: eso
          timeout: 10m
          values: |-
            installCRDs: true
        - chart:
            name: vcluster-platform
            repo: https://charts.loft.sh/
            version: __VCP_PLATFORM_VERSION__
          release:
            name: vcluster-platform
            namespace: vcluster-platform
          timeout: 15m
          values: |-
            env:
              LICENSE_TOKEN: __VCP_LICENSE_TOKEN__
            service:
              type: LoadBalancer
            ingress:
              enabled: false
            config:
              loftHost: __VCP_LOFT_HOST__
              costControl:
                enabled: false
              imageBuilder:
                enabled: false
        - chart:
            name: forgejo
            repo: oci://code.forgejo.org/forgejo-helm
            version: 16.0.2
          release:
            name: forgejo
            namespace: forgejo
          timeout: 15m
          values: |-
            strategy:
              type: Recreate
            persistence:
              enabled: true
              size: 20Gi
            service:
              http:
                type: LoadBalancer
            ingress:
              enabled: false
            gitea:
              admin:
                existingSecret: forgejo-admin-secret
                email: demo-admin@__VCP_LOFT_HOST__
              config:
                server:
                  ROOT_URL: https://__FORGEJO_HOST__/
                packages:
                  ENABLED: true
                service:
                  DISABLE_REGISTRATION: true
