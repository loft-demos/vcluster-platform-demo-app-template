apiVersion: v1
kind: ConfigMap
metadata:
  name: forgejo-runner-config
  namespace: forgejo
data:
  config.yaml: |
    log:
      level: info
    runner:
      file: /data/.runner
      capacity: 1
      labels:
        # This image keeps Node.js plus the Docker CLI together so workflows
        # can skip the per-job apt-get install that made local Forgejo builds slow.
        - docker:docker://{REPLACE_IMAGE_REPOSITORY_PREFIX}/{REPLACE_REPO_NAME}-forgejo-runner-job:{REPLACE_RUNNER_JOB_IMAGE_TAG}
        - ubuntu-latest:docker://{REPLACE_IMAGE_REPOSITORY_PREFIX}/{REPLACE_REPO_NAME}-forgejo-runner-job:{REPLACE_RUNNER_JOB_IMAGE_TAG}
        - ubuntu-22.04:docker://{REPLACE_IMAGE_REPOSITORY_PREFIX}/{REPLACE_REPO_NAME}-forgejo-runner-job:{REPLACE_RUNNER_JOB_IMAGE_TAG}
        - ubuntu-20.04:docker://{REPLACE_IMAGE_REPOSITORY_PREFIX}/{REPLACE_REPO_NAME}-forgejo-runner-job:{REPLACE_RUNNER_JOB_IMAGE_TAG}
      envs:
        DOCKER_HOST: unix:///var/run/docker.sock
      timeout: 3h
      insecure: false
      fetch_timeout: 5s
      fetch_interval: 2s
    cache:
      enabled: true
      dir: /data/cache
    container:
      network: bridge
      privileged: false
      valid_volumes: []
      docker_host: unix:///var/run/docker.sock
      options: >-
        --volume /etc/docker/certs.d:/etc/docker/certs.d:ro
      force_pull: false
    host:
      workdir_parent: /data/workdir
