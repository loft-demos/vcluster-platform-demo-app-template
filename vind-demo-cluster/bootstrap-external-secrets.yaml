apiVersion: v1
kind: Namespace
metadata:
  name: argocd
---
apiVersion: v1
kind: Namespace
metadata:
  name: crossplane-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: vcluster-platform
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: repo-creds-template
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vind-demo-store
  target:
    name: repo-creds-template
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repo-creds
      data:
        type: git
        url: https://github.com/{REPLACE_ORG_NAME}
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: argo-cd/repo-creds/{REPLACE_ORG_NAME}/username
    - secretKey: password
      remoteRef:
        key: argo-cd/repo-creds/{REPLACE_ORG_NAME}/password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vind-demo-store
  target:
    name: argocd-notifications-secret
    creationPolicy: Owner
  data:
    - secretKey: accessKey
      remoteRef:
        key: argocd/notifications/accessKey
    - secretKey: githubAppID
      remoteRef:
        key: argocd/notifications/githubAppID
    - secretKey: githubAppInstallationID
      remoteRef:
        key: argocd/notifications/githubAppInstallationID
    - secretKey: githubAppPrivateKey
      remoteRef:
        key: argocd/notifications/githubAppPrivateKey
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-login-secret
  namespace: vcluster-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vind-demo-store
  target:
    name: ghcr-login-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
  data:
    - secretKey: .dockerconfigjson
      remoteRef:
        key: ghcr/{REPLACE_ORG_NAME}/pull/.dockerconfigjson
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-provider-secret
  namespace: crossplane-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vind-demo-store
  target:
    name: github-provider-secret
    creationPolicy: Owner
  data:
    - secretKey: credentials
      remoteRef:
        key: crossplane/github-provider/credentials
