name: create-pr-preview

# on labeled pull requests that target the repository default branch
on:
  pull_request:
    types: [labeled]
env:
  REPO_NAME: ${{ github.event.repository.name }}
  PR_LINK: ${{ github.server_url }}/${{ github.repository }}/pull/${{ github.event.pull_request.number }}

jobs:
  create-preview-env:
    if: ${{ github.base_ref == github.event.repository.default_branch && github.event.label.name == 'preview' }}
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      pull-requests: write
    steps:
      - id: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - id: derive-preview-links
        shell: bash
        env:
          VCLUSTER_PLATFORM_URL: ${{ vars.VCLUSTER_PLATFORM_URL }}
        run: |
          platform_url="${VCLUSTER_PLATFORM_URL%/}"
          if [[ -z "$platform_url" ]]; then
            echo "VCLUSTER_PLATFORM_URL repository variable is required." >&2
            exit 1
          fi

          platform_host="${platform_url#*://}"
          platform_host="${platform_host%%/*}"
          platform_host_no_port="${platform_host%%:*}"

          if [[ "$platform_host_no_port" != *.* ]]; then
            echo "VCLUSTER_PLATFORM_URL must include a hostname with a base domain: $platform_url" >&2
            exit 1
          fi

          vcluster_name="${platform_host_no_port%%.*}"
          base_domain="${platform_host_no_port#*.}"
          preview_url="https://${REPO_NAME}-pr-${{ github.event.pull_request.number }}-${vcluster_name}.${base_domain}"
          argocd_app_url="https://argocd-${vcluster_name}.${base_domain}/applications/argocd/${REPO_NAME}-${{ github.event.pull_request.head.ref }}-pr${{ github.event.pull_request.number }}?view=tree"
          pods_url="https://${vcluster_name}.${base_domain}/projects/default/vclusters/${REPO_NAME}-pr-${{ github.event.pull_request.number }}/pods"

          {
            echo "preview_url=${preview_url}"
            echo "argocd_app_url=${argocd_app_url}"
            echo "pods_url=${pods_url}"
          } >> "$GITHUB_OUTPUT"

      - name: Install vCluster CLI
        uses: loft-sh/setup-vcluster@main
      - name: Show vCluster Version
        run: vcluster --version
      - name: Login to vCluster Platform instance
        env:
          VCLUSTER_PLATFORM_URL: ${{ vars.VCLUSTER_PLATFORM_URL }}
          ACCESS_KEY: ${{ secrets.VCLUSTER_PLATFORM_ACCESS_KEY }}
        run: vcluster platform login "$VCLUSTER_PLATFORM_URL" --access-key "$ACCESS_KEY"
      - id: create-preview-vcluster
        run: |
          vcluster platform create vcluster $REPO_NAME-pr-${{ github.event.pull_request.number }} --project default \
            --template preview-template \
            --set-parameters 'k8sVersion=v1.33.3' \
            --link "GitHub PR=$PR_LINK" \
            --link "Preview=${{ steps.derive-preview-links.outputs.preview_url }}/" \
            --link "Argo CD=${{ steps.derive-preview-links.outputs.argocd_app_url }}"

      - id: trigger-argocd-appset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --add-label "preview-cluster-ready"
      - id: add-pr-link
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ github.event.pull_request.number }}
          header: release
          message: |
            [Preview environment app link](${{ steps.derive-preview-links.outputs.preview_url }})
            
            [Argo CD App](${{ steps.derive-preview-links.outputs.argocd_app_url }})
            
            [Preview vcluster pods](${{ steps.derive-preview-links.outputs.pods_url }})
            
