name: replace-text

# on seed commit or manual dispatch
on:
  workflow_dispatch:
    inputs:
      vcluster_name:
        description: "Override default vCluster name which matches the repo name (minus `-app`)"
        required: false
        default: ""
      base_domain:
        description: "Base domain used to create example host names"
        required: true
        default: "us.demo.dev"
      git_target_revision:
        description: "Git branch or revision to render for self-repo references"
        required: false
        default: ""
  push:
env:
  REPO_NAME: ${{ github.event.repository.name }}
  ORG_NAME: ${{ github.repository_owner || 'loft-demos' }}
  BASE_DOMAIN: ${{ inputs.base_domain || 'us.demo.dev' }}
  GIT_BASE_URL: https://github.com
  GIT_PUBLIC_URL: https://github.com
  GIT_TARGET_REVISION: ${{ inputs.git_target_revision || github.event.repository.default_branch || 'main' }}
  APP_IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner || 'loft-demos' }}/${{ github.event.repository.name }}
  IMAGE_REPOSITORY_PREFIX: ghcr.io/${{ github.repository_owner || 'loft-demos' }}
  OCI_REGISTRY_HOST: ghcr.io
  SNAPSHOT_OCI_REPOSITORY: ghcr.io/${{ github.repository_owner || 'loft-demos' }}/${{ github.event.repository.name }}
  IMAGE_PULL_SOURCE_SECRET_NAME: ${{ github.repository_owner || 'loft-demos' }}-ghcr-write-pat
  ONEPASSWORD_VAULT: ${{ github.repository_owner || 'loft-demos' }}
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner || 'loft-demos' }}/${{ github.event.repository.name }}

jobs:
  replace-text:
    if: ${{ !github.event.repository.is_template && ( github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[run replace-text]') ) }}
    runs-on: ubuntu-22.04
    permissions:
      packages: write
      contents: write
      actions: write
    steps:
      - name: set-vcluster-name
        id: set-vcluster-name
        shell: bash
        run: |
          if [ -n "${{ inputs.vcluster_name }}" ]; then
            VCLUSTER_NAME="${{ inputs.vcluster_name }}"
          else
            VCLUSTER_NAME="${REPO_NAME%-app}"
          fi

          KARGO_HOST="kargo-${VCLUSTER_NAME}.${BASE_DOMAIN}"
          KARGO_WEBHOOK_HOST="kargo-webhooks-${VCLUSTER_NAME}.${BASE_DOMAIN}"
          ARGOCD_HOST="argocd-${VCLUSTER_NAME}.${BASE_DOMAIN}"

          {
            echo "VCLUSTER_NAME=${VCLUSTER_NAME}"
            echo "KARGO_HOST=${KARGO_HOST}"
            echo "KARGO_WEBHOOK_HOST=${KARGO_WEBHOOK_HOST}"
            echo "ARGOCD_HOST=${ARGOCD_HOST}"
          } >> "$GITHUB_ENV"

          {
            echo "vcluster_name=${VCLUSTER_NAME}"
            echo "kargo_host=${KARGO_HOST}"
            echo "kargo_webhook_host=${KARGO_WEBHOOK_HOST}"
            echo "argocd_host=${ARGOCD_HOST}"
          } >> "$GITHUB_OUTPUT"

          echo "vCluster name is ${VCLUSTER_NAME}"
      - uses: actions/checkout@v3
      - name: replace template placeholders
        shell: bash
        env:
          VCLUSTER_NAME: ${{ steps.set-vcluster-name.outputs.vcluster_name }}
          ARGOCD_HOST: ${{ steps.set-vcluster-name.outputs.argocd_host }}
          KARGO_HOST: ${{ steps.set-vcluster-name.outputs.kargo_host }}
          KARGO_WEBHOOK_HOST: ${{ steps.set-vcluster-name.outputs.kargo_webhook_host }}
        run: |
          file_count=0
          search_roots=()

          for prefix in "." "./project"; do
            for dir in helm-chart self-managed-demo-cluster vind-demo-cluster vcluster-gitops vcluster-use-cases; do
              root="${prefix}/${dir}"
              if [[ -d "$root" ]]; then
                search_roots+=("$root")
              fi
            done
          done

          if [ "${#search_roots[@]}" -eq 0 ]; then
            echo "[INFO] No matching repo roots found for replacement."
            exit 0
          fi

          for root in "${search_roots[@]}"; do
            while IFS= read -r -d '' file; do
              file_count=$((file_count + 1))
              perl -0pi -e '
                s/\{REPLACE_REPO_NAME\}/$ENV{REPO_NAME}/g;
                s/\{REPLACE_ORG_NAME\}/$ENV{ORG_NAME}/g;
                s/\{REPLACE_VCLUSTER_NAME\}/$ENV{VCLUSTER_NAME}/g;
                s/\{REPLACE_BASE_DOMAIN\}/$ENV{BASE_DOMAIN}/g;
                s/\{REPLACE_FORGEJO_USERNAME\}/$ENV{GITHUB_ACTOR}/g;
                s/\{REPLACE_GIT_BASE_URL\}/$ENV{GIT_BASE_URL}/g;
                s/\{REPLACE_GIT_PUBLIC_URL\}/$ENV{GIT_PUBLIC_URL}/g;
                s/\{REPLACE_GIT_TARGET_REVISION\}/$ENV{GIT_TARGET_REVISION}/g;
                s/\{REPLACE_ARGOCD_HOST\}/$ENV{ARGOCD_HOST}/g;
                s/\{REPLACE_APP_IMAGE_REPOSITORY\}/$ENV{APP_IMAGE_REPOSITORY}/g;
                s/\{REPLACE_IMAGE_REPOSITORY_PREFIX\}/$ENV{IMAGE_REPOSITORY_PREFIX}/g;
                s/\{REPLACE_OCI_REGISTRY_HOST\}/$ENV{OCI_REGISTRY_HOST}/g;
                s/\{REPLACE_SNAPSHOT_OCI_REPOSITORY\}/$ENV{SNAPSHOT_OCI_REPOSITORY}/g;
                s/\{REPLACE_IMAGE_PULL_SOURCE_SECRET_NAME\}/$ENV{IMAGE_PULL_SOURCE_SECRET_NAME}/g;
                s/\{REPLACE_1PASSWORD_VAULT\}/$ENV{ONEPASSWORD_VAULT}/g;
                s/\{REPLACE_KARGO_HOST\}/$ENV{KARGO_HOST}/g;
                s/\{REPLACE_KARGO_WEBHOOK_HOST\}/$ENV{KARGO_WEBHOOK_HOST}/g;
              ' "$file"
            done < <(
              find "$root" \
                -type f \
                \( -name '*.yaml' -o -name '*.yml' \) \
                -print0
            )
          done

          if [ "$file_count" -eq 0 ]; then
            echo "[INFO] No YAML files found for replacement."
            exit 0
          fi
      - name: validate replacements
        shell: bash
        run: |
          unresolved=0
          search_roots=()

          for prefix in "." "./project"; do
            for dir in helm-chart self-managed-demo-cluster vind-demo-cluster vcluster-gitops vcluster-use-cases; do
              root="${prefix}/${dir}"
              if [[ -d "$root" ]]; then
                search_roots+=("$root")
              fi
            done
          done

          if [ "${#search_roots[@]}" -eq 0 ]; then
            echo "[INFO] No matching repo roots found for validation."
            exit 0
          fi

          for root in "${search_roots[@]}"; do
            while IFS= read -r -d '' file; do
              if grep -nE '\{REPLACE_REPO_NAME\}|\{REPLACE_ORG_NAME\}|\{REPLACE_VCLUSTER_NAME\}|\{REPLACE_BASE_DOMAIN\}|\{REPLACE_FORGEJO_USERNAME\}|\{REPLACE_GIT_BASE_URL\}|\{REPLACE_GIT_PUBLIC_URL\}|\{REPLACE_GIT_TARGET_REVISION\}|\{REPLACE_ARGOCD_HOST\}|\{REPLACE_APP_IMAGE_REPOSITORY\}|\{REPLACE_IMAGE_REPOSITORY_PREFIX\}|\{REPLACE_OCI_REGISTRY_HOST\}|\{REPLACE_SNAPSHOT_OCI_REPOSITORY\}|\{REPLACE_IMAGE_PULL_SOURCE_SECRET_NAME\}|\{REPLACE_1PASSWORD_VAULT\}|\{REPLACE_KARGO_HOST\}|\{REPLACE_KARGO_WEBHOOK_HOST\}' "$file"; then
                unresolved=1
              fi
            done < <(
              find "$root" \
                -type f \
                \( -name '*.yaml' -o -name '*.yml' \) \
                -print0
            )
          done

          if [ "$unresolved" -ne 0 ]; then
            echo "[ERROR] Unresolved replace-text workflow placeholders remain in YAML files after replacement."
            exit 1
          fi
      - name: write completion marker
        shell: bash
        run: |
          mkdir -p .generator-seed
          cat > .generator-seed/replace-text-complete.txt <<EOF
          repo=${REPO_NAME}
          branch=${GIT_TARGET_REVISION}
          source_commit=${GITHUB_SHA}
          completed_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF
      - uses: stefanzweifel/git-auto-commit-action@v5
      - name: delete-package
        id: delete-package
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.KM_PAT_DELETE_PACKAGES }}
        run: |
          PACKAGE_NAME=${{ github.event.repository.name }}

          echo "[INFO] Attempting to delete package: $PACKAGE_NAME"

          if gh api \
            --method DELETE \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /orgs/${{ env.ORG_NAME }}/packages/container/$PACKAGE_NAME; then
            echo "[INFO] Package deleted successfully."
          else
            EXIT_CODE=$?
            if [[ "$EXIT_CODE" -eq 1 ]]; then
              echo "[WARN] Package '$PACKAGE_NAME' not found. Skipping delete."
            else
              echo "[ERROR] Failed to delete package '$PACKAGE_NAME' (exit code: $EXIT_CODE)"
              exit $EXIT_CODE
            fi
          fi
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.vendor=loft.sh
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
      - name: Get short SHA
        run: echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_ENV
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./src
          build-args: |
            IMAGE_TAG=0.0.1
          platforms: linux/amd64
          push: true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:0.0.1
          labels: ${{ steps.meta.outputs.labels }}
      - name: Disable this workflow
        shell: bash
        run: |
          gh workflow disable -R $GITHUB_REPOSITORY "${{ github.workflow }}"
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
