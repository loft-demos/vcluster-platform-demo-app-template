name: build-push-main

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'helm-chart/**'

concurrency:
  group: build-push
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: ubuntu-22.04
    env:
      DOCKER_HOST: unix:///var/run/docker.sock
    defaults:
      run:
        shell: sh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Docker CLI is available
        run: |
          if command -v docker >/dev/null 2>&1; then
            docker --version
            exit 0
          fi

          if ! command -v apt-get >/dev/null 2>&1; then
            echo "ERROR: docker CLI is missing and this runner image does not provide apt-get." >&2
            exit 1
          fi

          if [ "$(id -u)" -ne 0 ]; then
            echo "ERROR: docker CLI is missing and this job is not running as root, so it cannot install docker.io." >&2
            exit 1
          fi

          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends docker.io
          docker --version

      - name: Read appVersion from Helm chart
        run: |
          APP_VERSION="$(sed -n 's/^appVersion:[[:space:]]*//p' helm-chart/Chart.yaml | head -n1 | tr -d "\"'[:space:]")"
          if [ -z "$APP_VERSION" ]; then
            echo "ERROR: could not read appVersion from helm-chart/Chart.yaml" >&2
            exit 1
          fi
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"

      - name: Build image
        run: |
          docker build \
            --label "org.opencontainers.image.revision=$GITHUB_SHA" \
            -t "$IMAGE_BASE:$APP_VERSION" \
            -t "$IMAGE_BASE:latest" \
            ./src
        env:
          IMAGE_BASE: '{REPLACE_IMAGE_REPOSITORY_PREFIX}/{REPLACE_REPO_NAME}-demo-app'

      - name: Configure Forgejo Container Registry auth and push
        run: |
          mkdir -p "$HOME/.docker"
          REGISTRY_AUTH="$(printf '%s:%s' "$GITHUB_ACTOR" "$FORGEJO_TOKEN" | base64 | tr -d '\n')"
          cat >"$HOME/.docker/config.json" <<EOF
          {
            "auths": {
              "{REPLACE_FORGEJO_HOST}": {
                "auth": "${REGISTRY_AUTH}"
              }
            }
          }
          EOF
          docker push "$IMAGE_BASE:$APP_VERSION"
          docker push "$IMAGE_BASE:latest"
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          IMAGE_BASE: '{REPLACE_IMAGE_REPOSITORY_PREFIX}/{REPLACE_REPO_NAME}-demo-app'
