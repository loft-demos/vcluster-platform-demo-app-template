name: build-push-main

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'helm-chart/**'

concurrency:
  group: build-push
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read appVersion from Helm chart
        id: version
        run: |
          APP_VERSION="$(sed -n 's/^appVersion:[[:space:]]*//p' helm-chart/Chart.yaml | head -n1 | tr -d "\"'[:space:]")"
          if [[ -z "$APP_VERSION" ]]; then
            echo "ERROR: could not read appVersion from helm-chart/Chart.yaml" >&2
            exit 1
          fi
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Forgejo Container Registry
        uses: docker/login-action@v3
        with:
          registry: '{REPLACE_FORGEJO_HOST}'
          username: ${{ gitea.actor }}
          password: ${{ secrets.GITEA_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          file: ./src/Dockerfile
          push: true
          tags: |
            {REPLACE_FORGEJO_HOST}/{REPLACE_ORG_NAME}/{REPLACE_REPO_NAME}/{REPLACE_REPO_NAME}-demo-app:${{ env.APP_VERSION }}
            {REPLACE_FORGEJO_HOST}/{REPLACE_ORG_NAME}/{REPLACE_REPO_NAME}/{REPLACE_REPO_NAME}-demo-app:latest
          labels: |
            org.opencontainers.image.revision=${{ gitea.sha }}
            org.opencontainers.image.source=${{ gitea.server_url }}/${{ gitea.repository }}
