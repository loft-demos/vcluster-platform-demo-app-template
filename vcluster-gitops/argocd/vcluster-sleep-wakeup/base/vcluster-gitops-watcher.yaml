apiVersion: v1
kind: ServiceAccount
metadata:
  name: vcluster-gitops-watcher
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vcluster-gitops-watcher-vci-read
rules:
  - apiGroups: ["management.loft.sh"]
    resources: ["virtualclusterinstances"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kargo.akuity.io"]
    resources: ["promotions"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vcluster-gitops-watcher-vci-read
subjects:
  - kind: ServiceAccount
    name: vcluster-gitops-watcher
    namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vcluster-gitops-watcher-vci-read
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vcluster-gitops-watcher-argocd-write
  namespace: argocd
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "patch"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications/status"]
    verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vcluster-gitops-watcher-argocd-write
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: vcluster-gitops-watcher
    namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vcluster-gitops-watcher-argocd-write
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vcluster-gitops-watcher
  namespace: argocd
  labels:
    app.kubernetes.io/name: vcluster-gitops-watcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vcluster-gitops-watcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vcluster-gitops-watcher
    spec:
      serviceAccountName: vcluster-gitops-watcher
      containers:
        - name: watcher
          image: ghcr.io/loft-demos/vcluster-gitops-watcher:1.0.0-rc.6
          imagePullPolicy: IfNotPresent
          env:
            - name: ARGOCD_NAMESPACE
              value: "argocd"
            - name: ARGOCD_APPLICATION_NAMESPACE
              value: "argocd"
            - name: ARGOCD_CLUSTER_SECRET_NAMESPACE
              value: "argocd"
            - name: ARGOCD_CLUSTER_SECRET_NAME_TEMPLATE
              value: "loft-{project}-vcluster-{virtualcluster}"
            - name: WATCH_POLL_INTERVAL
              value: "2s"
            - name: WATCH_PROJECT_NAMESPACE_PREFIXES
              value: "p-,loft-p-"
            - name: WATCH_PATCH_APPLICATION_HEALTH
              value: "true"
            - name: WATCH_WAKE_UPSTREAM_BASE
              value: "http://loft.vcluster-platform.svc.cluster.local"
            - name: WATCH_WAKE_TOKEN_PATH
              value: "/var/run/secrets/platform/token"
            - name: WATCH_WAKE_TIMEOUT
              value: "10s"
            - name: WATCH_WAKE_RETRY_INTERVAL
              value: "30s"
          volumeMounts:
            - name: platform-token
              mountPath: /var/run/secrets/platform
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: platform-token
          secret:
            secretName: argocd-notifications-secret
            items:
              - key: accessKey
                path: token
