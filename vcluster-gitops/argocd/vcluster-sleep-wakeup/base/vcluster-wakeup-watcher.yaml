apiVersion: v1
kind: ServiceAccount
metadata:
  name: vcluster-wakeup-watcher
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vcluster-wakeup-watcher-vci-read
rules:
  - apiGroups: ["management.loft.sh"]
    resources: ["virtualclusterinstances"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vcluster-wakeup-watcher-vci-read
subjects:
  - kind: ServiceAccount
    name: vcluster-wakeup-watcher
    namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vcluster-wakeup-watcher-vci-read
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vcluster-wakeup-watcher-argocd-write
  namespace: argocd
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "patch"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications/status"]
    verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vcluster-wakeup-watcher-argocd-write
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: vcluster-wakeup-watcher
    namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vcluster-wakeup-watcher-argocd-write
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vcluster-wakeup-watcher
  namespace: argocd
  labels:
    app.kubernetes.io/name: vcluster-wakeup-watcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vcluster-wakeup-watcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vcluster-wakeup-watcher
    spec:
      serviceAccountName: vcluster-wakeup-watcher
      containers:
        - name: watcher
          image: ghcr.io/loft-demos/vcluster-wakeup-watcher:0.9.0
          imagePullPolicy: IfNotPresent
          env:
            - name: ARGOCD_NAMESPACE
              value: "argocd"
            - name: ARGOCD_APPLICATION_NAMESPACE
              value: "argocd"
            - name: ARGOCD_CLUSTER_SECRET_NAMESPACE
              value: "argocd"
            - name: ARGOCD_CLUSTER_SECRET_NAME_TEMPLATE
              value: "loft-{project}-vcluster-{virtualcluster}"
            - name: WATCH_POLL_INTERVAL
              value: "2s"
            - name: WATCH_PROJECT_NAMESPACE_PREFIXES
              value: "p-,loft-p-"
            - name: WATCH_PATCH_APPLICATION_HEALTH
              value: "true"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
