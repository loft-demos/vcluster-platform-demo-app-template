apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: continuous-promotion-legacy-argo-kargo
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            continuousPromotion: 'true'
            legacyArgoKargo: 'true'
  template:
    metadata:
      name: 'continuous-promotion-legacy-argo-kargo-apps'
      labels:
        use-case.demos.vcluster.com: continuous-promotion
        use-case.demos.vcluster.com/kargo-owner: argo
    spec:
      destination:
        server: '{{server}}'
        namespace: argocd
      project: default
      source:
        repoURL: '{REPLACE_GIT_BASE_URL}/{REPLACE_ORG_NAME}/{REPLACE_REPO_NAME}'
        targetRevision: HEAD
        path: vcluster-use-cases/continuous-promotion/apps-legacy-argo-kargo
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - Replace=true
        retry:
          limit: 5
          backoff:
            duration: 20s
            factor: 2
            maxDuration: 3m
