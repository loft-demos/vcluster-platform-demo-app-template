apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: virtual-cluster-templates
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'http://forgejo-http.forgejo.svc.cluster.local:3000/vcluster-demos/vcp-gitops'
    targetRevision: main
    path: vcluster-gitops/virtual-cluster-templates/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: loft
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true