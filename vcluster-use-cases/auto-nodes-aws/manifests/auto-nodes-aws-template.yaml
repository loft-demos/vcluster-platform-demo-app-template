apiVersion: management.loft.sh/v1
kind: VirtualClusterTemplate
metadata:
  name: auto-nodes-aws-template
spec:
  displayName: Auto Nodes AWS Template
  description: vCluster with Auto Nodes enabled — AWS EC2 worker nodes provisioned automatically via the aws-ec2-node-provider Terraform NodeProvider.
  owner:
    team: loft-admins
  template:
    metadata: {}
    instanceTemplate:
      metadata: {}
    pro:
      enabled: true
    helmRelease:
      chart:
        version: 0.33.1
      values: |-
        controlPlane:
          backingStore:
            etcd:
              embedded:
                enabled: true
          statefulSet:
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 1
                memory: 2Gi
    accessPoint:
      ingress: {}
    spaceTemplate:
      metadata: {}
  versions:
    - version: 1.0.0
      template:
        metadata: {}
        instanceTemplate:
          metadata: {}
        objects: |-
          ---
          apiVersion: v1
          kind: Namespace
          metadata:
            name: auto-nodes-demo
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: scale-up-medium-demo
            namespace: auto-nodes-demo
            annotations:
              demo.loft.sh/scale-note: Scale this deployment from 0 replicas to trigger a node larger than t3.small.
          spec:
            replicas: 0
            selector:
              matchLabels:
                app: scale-up-medium-demo
            template:
              metadata:
                labels:
                  app: scale-up-medium-demo
              spec:
                containers:
                  - name: sleeper
                    image: busybox:1.36
                    command:
                      - /bin/sh
                      - -c
                      - sleep 36000
                    resources:
                      requests:
                        cpu: 1500m
                        memory: 3Gi
                      limits:
                        cpu: 1500m
                        memory: 3Gi
        pro:
          enabled: true
        helmRelease:
          chart:
            version: 0.34.0
          values: |-
            controlPlane:
              backingStore:
                etcd:
                  embedded:
                    enabled: true
              statefulSet:
                resources:
                  requests:
                    cpu: 100m
                    memory: 512Mi
                  limits:
                    cpu: 1
                    memory: 2Gi
              distro:
                k8s:
                  image:
                    tag: '{{ .Values.k8sVersion }}'
            privateNodes:
              enabled: true
              autoNodes:
                - provider: aws-ec2-node-provider
                  dynamic:
                    - name: node-pool-1
                      limits:
                        nodes: '{{ .Values.autoNodeCount }}'
            networking:
              podCIDR: 10.64.0.0/16
              serviceCIDR: 10.128.0.0/16
        accessPoint:
          ingress: {}
        spaceTemplate:
          metadata: {}
      parameters:
        - variable: k8sVersion
          label: k8sVersion
          description: Please select Kubernetes version
          type: string
          options:
            - v1.35.4
            - v1.34.7
            - v1.33.11
            - v1.32.13
          defaultValue: v1.34.7
          section: Kubernetes Environment
        - variable: autoNodeCount
          label: Auto Node Pool Limit
          description: Maximum number of auto-provisioned nodes in node-pool-1.
          type: string
          required: true
          defaultValue: "3"
          options:
            - "1"
            - "3"
            - "5"
          validation: ^(1|3|5)$
          section: Auto Nodes
