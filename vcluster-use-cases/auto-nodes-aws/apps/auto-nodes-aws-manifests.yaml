apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auto-nodes-aws-manifests
  namespace: argocd
  labels:
    use-case.demos.vcluster.com: auto-nodes-aws
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: '{REPLACE_GIT_BASE_URL}/{REPLACE_ORG_NAME}/{REPLACE_REPO_NAME}'
    targetRevision: '{REPLACE_GIT_TARGET_REVISION}'
    path: vcluster-use-cases/auto-nodes-aws/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: vcluster-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true    
    syncOptions:
    - CreateNamespace=true
    - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 5s 
        factor: 2 
        maxDuration: 1m
