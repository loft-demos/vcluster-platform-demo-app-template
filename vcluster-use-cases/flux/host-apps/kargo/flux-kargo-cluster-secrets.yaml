apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-kargo-cluster-secrets
  namespace: p-vcluster-flux-demo
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: vcluster-flux-demo-kargo
    namespace: p-vcluster-flux-demo
  path: ./vcluster-use-cases/flux/host-apps/kargo/cluster/secrets
  healthCheckExprs:
    - apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      inProgress: "!status.conditions.exists(c, c.type == 'Ready' && c.status == 'True')"
      current: "status.conditions.exists(c, c.type == 'Ready' && c.status == 'True')"
