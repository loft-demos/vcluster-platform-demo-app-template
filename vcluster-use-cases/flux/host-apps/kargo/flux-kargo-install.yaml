apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-kargo-install
  namespace: p-vcluster-flux-demo
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: vcluster-flux-demo
    namespace: p-vcluster-flux-demo
  path: ./vcluster-use-cases/flux/host-apps/kargo/install
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta2
      kind: HelmRelease
      name: kargo
      namespace: p-vcluster-flux-demo
