apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: continuous-promotion-flux-kargo-manifests
  namespace: argocd
  labels:
    use-case.demos.vcluster.com: continuous-promotion
    use-case.demos.vcluster.com/kargo-owner: flux
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: '{REPLACE_GIT_BASE_URL}/{REPLACE_ORG_NAME}/{REPLACE_REPO_NAME}'
    targetRevision: '{REPLACE_GIT_TARGET_REVISION}'
    path: vcluster-use-cases/continuous-promotion/manifests-flux-kargo
  destination:
    server: https://kubernetes.default.svc
    namespace: p-vcluster-flux-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
