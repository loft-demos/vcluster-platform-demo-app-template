kind: VirtualClusterTemplate
apiVersion: management.loft.sh/v1
metadata:
  name: kargo-pre-prod-template
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    vcluster.com/template-icon: vcluster-box.svg
spec:
  displayName: Kargo Pre-Prod vCluster Template
  description: |
    Long-lived pre-production vCluster used as a testing gate in Kargo promotion
    pipelines. Runs on the same underlying cluster hardware as production, providing
    production-equivalent testing without dedicated infrastructure. Scales to zero
    when idle to minimise cost, waking automatically when a new Promotion arrives.
  owner:
    team: loft-admins
  template:
    metadata: {}
    instanceTemplate:
      metadata: {}
    pro: {}
    helmRelease:
      chart:
        version: 0.32.1
      values: |-
        sync:
          toHost:
            ingresses:
              enabled: true
        # Checkout https://vcluster.com/pro/docs/ for more config options
    accessPoint:
      ingress: {}
    spaceTemplate:
      metadata: {}
  versions:
    - version: 1.0.0
      template:
        metadata:
          labels:
            loft.sh/import-argocd: 'true'
        instanceTemplate:
          metadata:
            annotations:
              loft.sh/custom-links: >-
                Guestbook=https://guestbook-ppg-pre-prod-{{ .Values.loft.clusterAnnotations.domainPrefix }}.{{ .Values.loft.clusterAnnotations.domain }}
        pro:
          enabled: true
        helmRelease:
          chart:
            version: 0.34.0
          values: |-
            sleep:
              auto:
                # Scale to zero quickly when Kargo is not actively promoting
                afterInactivity: "45m"
                timezone: '{{ default "America/New_York" .Values.loft.clusterAnnotations.sleepTimeZone }}'
            deletion:
              auto:
                # Long-lived instance — only delete after extended inactivity
                afterInactivity: 720h
            sync:
              toHost:
                ingresses:
                  enabled: true
            integrations:
              externalSecrets:
                enabled: true
            controlPlane:
              backingStore:
                etcd:
                  embedded:
                    enabled: true
              coredns:
                embedded: true
            # Checkout https://vcluster.com/pro/docs/ for more config options
        accessPoint:
          ingress: {}
        spaceTemplate:
          metadata: {}
  access:
    - verbs:
        - '*'
      subresources:
        - '*'
      users:
        - admin
