# ArgoCD Applications for the pre-prod-gate pipeline.
# Kargo updates the image tag on these Applications via argocd-update promotion steps.
#
# guestbook-stage:    targets the ppg-pre-prod vCluster (stage namespace)
# guestbook-pre-prod: targets the ppg-pre-prod vCluster (guestbook namespace, with verification)
# guestbook-prod-ppg: targets production (update destination to a real prod cluster)
#
# Sync wave 3 ensures VCIs (wave 2) are registered with ArgoCD before these Apps are created.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook-stage
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    kargo.akuity.io/authorized-stage: pre-prod-gate:stage
    notifications.argoproj.io/subscribe.wakeup-vcluster.vcluster-platform: ''
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: '{REPLACE_GIT_BASE_URL}/{REPLACE_ORG_NAME}/{REPLACE_REPO_NAME}'
    targetRevision: HEAD
    path: vcluster-use-cases/continuous-promotion/guestbook/stages/ppg-stage
  destination:
    name: loft-default-vcluster-ppg-pre-prod
    namespace: guestbook-stage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook-pre-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    kargo.akuity.io/authorized-stage: pre-prod-gate:pre-prod-vcluster
    notifications.argoproj.io/subscribe.wakeup-vcluster.vcluster-platform: ''
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: '{REPLACE_GIT_BASE_URL}/{REPLACE_ORG_NAME}/{REPLACE_REPO_NAME}'
    targetRevision: HEAD
    path: vcluster-use-cases/continuous-promotion/guestbook/stages/pre-prod
  destination:
    name: loft-default-vcluster-ppg-pre-prod
    namespace: guestbook
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# TODO: Update destination to point at a real production cluster
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook-prod-ppg
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    kargo.akuity.io/authorized-stage: pre-prod-gate:prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: '{REPLACE_GIT_BASE_URL}/{REPLACE_ORG_NAME}/{REPLACE_REPO_NAME}'
    targetRevision: HEAD
    path: vcluster-use-cases/continuous-promotion/guestbook/stages/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: guestbook-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
