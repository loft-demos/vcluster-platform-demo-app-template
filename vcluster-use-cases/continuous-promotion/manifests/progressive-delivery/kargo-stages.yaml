# ProjectConfig enables auto-promotion per stage (replaces the removed PromotionPolicy CRD)
apiVersion: kargo.akuity.io/v1alpha1
kind: ProjectConfig
metadata:
  name: progressive-delivery
  namespace: progressive-delivery
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  promotionPolicies:
    # dev and staging auto-promote; prod requires manual approval in the Kargo UI
    - stageSelector:
        name: dev
      autoPromotionEnabled: true
    - stageSelector:
        name: staging
      autoPromotionEnabled: true
---
# dev: auto-promotes directly from the Warehouse (always latest)
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: dev
  namespace: progressive-delivery
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: guestbook
      sources:
        direct: true
  promotionTemplate:
    spec:
      steps:
        - uses: http
          retry:
            timeout: 2m
          config:
            method: POST
            url: http://vcluster-wakeup-proxy.argocd.svc.cluster.local/kubernetes/project/default/virtualcluster/pd-dev
            headers:
              - name: Authorization
                value: Bearer ${{ secret('vcluster-wakeup-proxy').accessKey }}
              - name: User-Agent
                value: kargo-wakeup
            responseContentType: text/plain
            timeout: 10s
            successExpression: response.status in [200, 202, 204]
            failureExpression: response.status in [401, 403, 404]
        - uses: http
          retry:
            timeout: 10m
          config:
            method: GET
            url: http://vcluster-wakeup-proxy.argocd.svc.cluster.local/kubernetes/management/apis/management.loft.sh/v1/namespaces/p-default/virtualclusterinstances/pd-dev
            headers:
              - name: Authorization
                value: Bearer ${{ secret('vcluster-wakeup-proxy').accessKey }}
              - name: User-Agent
                value: kargo-wakeup
            responseContentType: application/json
            timeout: 10s
            successExpression: response.status == 200 && response.body.status.phase == 'Ready'
            failureExpression: response.status in [401, 403, 404]
        - uses: argocd-update
          config:
            apps:
              - name: guestbook-dev
                sources:
                  - repoURL: '{REPLACE_GIT_BASE_URL}/{REPLACE_ORG_NAME}/{REPLACE_REPO_NAME}'
                    kustomize:
                      images:
                        - repoURL: '{REPLACE_APP_IMAGE_REPOSITORY}'
                          tag: '${{ imageFrom("{REPLACE_APP_IMAGE_REPOSITORY}").Tag }}'
---
# staging: promotes from dev, runs health-check verification before prod is eligible
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: staging
  namespace: progressive-delivery
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: guestbook
      sources:
        stages:
          - dev
  verification:
    analysisTemplates:
      - name: guestbook-health
    args:
      - name: app-url
        value: "https://guestbook-staging-{REPLACE_VCLUSTER_NAME}.{REPLACE_BASE_DOMAIN}"
  promotionTemplate:
    spec:
      steps:
        - uses: http
          retry:
            timeout: 2m
          config:
            method: POST
            url: http://vcluster-wakeup-proxy.argocd.svc.cluster.local/kubernetes/project/default/virtualcluster/pd-staging
            headers:
              - name: Authorization
                value: Bearer ${{ secret('vcluster-wakeup-proxy').accessKey }}
              - name: User-Agent
                value: kargo-wakeup
            responseContentType: text/plain
            timeout: 10s
            successExpression: response.status in [200, 202, 204]
            failureExpression: response.status in [401, 403, 404]
        - uses: http
          retry:
            timeout: 10m
          config:
            method: GET
            url: http://vcluster-wakeup-proxy.argocd.svc.cluster.local/kubernetes/management/apis/management.loft.sh/v1/namespaces/p-default/virtualclusterinstances/pd-staging
            headers:
              - name: Authorization
                value: Bearer ${{ secret('vcluster-wakeup-proxy').accessKey }}
              - name: User-Agent
                value: kargo-wakeup
            responseContentType: application/json
            timeout: 10s
            successExpression: response.status == 200 && response.body.status.phase == 'Ready'
            failureExpression: response.status in [401, 403, 404]
        - uses: argocd-update
          config:
            apps:
              - name: guestbook-staging
                sources:
                  - repoURL: '{REPLACE_GIT_BASE_URL}/{REPLACE_ORG_NAME}/{REPLACE_REPO_NAME}'
                    kustomize:
                      images:
                        - repoURL: '{REPLACE_APP_IMAGE_REPOSITORY}'
                          tag: '${{ imageFrom("{REPLACE_APP_IMAGE_REPOSITORY}").Tag }}'
---
# prod: requires manual approval in the Kargo UI; only eligible after staging verification passes
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: progressive-delivery
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: guestbook
      sources:
        stages:
          - staging
  promotionTemplate:
    spec:
      steps:
        - uses: http
          retry:
            timeout: 2m
          config:
            method: POST
            url: http://vcluster-wakeup-proxy.argocd.svc.cluster.local/kubernetes/project/default/virtualcluster/pd-prod
            headers:
              - name: Authorization
                value: Bearer ${{ secret('vcluster-wakeup-proxy').accessKey }}
              - name: User-Agent
                value: kargo-wakeup
            responseContentType: text/plain
            timeout: 10s
            successExpression: response.status in [200, 202, 204]
            failureExpression: response.status in [401, 403, 404]
        - uses: http
          retry:
            timeout: 10m
          config:
            method: GET
            url: http://vcluster-wakeup-proxy.argocd.svc.cluster.local/kubernetes/management/apis/management.loft.sh/v1/namespaces/p-default/virtualclusterinstances/pd-prod
            headers:
              - name: Authorization
                value: Bearer ${{ secret('vcluster-wakeup-proxy').accessKey }}
              - name: User-Agent
                value: kargo-wakeup
            responseContentType: application/json
            timeout: 10s
            successExpression: response.status == 200 && response.body.status.phase == 'Ready'
            failureExpression: response.status in [401, 403, 404]
        - uses: argocd-update
          config:
            apps:
              - name: guestbook-prod
                sources:
                  - repoURL: '{REPLACE_GIT_BASE_URL}/{REPLACE_ORG_NAME}/{REPLACE_REPO_NAME}'
                    kustomize:
                      images:
                        - repoURL: '{REPLACE_APP_IMAGE_REPOSITORY}'
                          tag: '${{ imageFrom("{REPLACE_APP_IMAGE_REPOSITORY}").Tag }}'
