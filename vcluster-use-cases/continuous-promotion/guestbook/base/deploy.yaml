apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestbook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: guestbook
  template:
    metadata:
      labels:
        app: guestbook
    spec:
      containers:
        - name: guestbook
          # Kargo updates this image tag via argocd-update image override when promoting
          image: '{REPLACE_APP_IMAGE_REPOSITORY}'
          env:
            - name: DEMO_IMAGE
              value: ""
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
