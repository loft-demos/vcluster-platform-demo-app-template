apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kargo-operator
  namespace: argocd
  labels:
    use-case.demos.vcluster.com: continuous-promotion
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: kargo
  project: default
  source:
    chart: kargo
    repoURL: ghcr.io/akuity/kargo-charts
    # Check https://github.com/akuity/kargo/pkgs/container/kargo-charts%2Fkargo for latest version
    targetRevision: 1.9.5
    helm:
      values: |
        api:
          # Domain only — no protocol prefix
          host: kargo.{REPLACE_BASE_DOMAIN}

          adminAccount:
            enabled: true
            # Generate with: htpasswd -bnBC 10 "" <password> | tr -d ':\n' | sed 's/$2y/$2a/'
            passwordHash: '{REPLACE_KARGO_ADMIN_PASSWORD_HASH}'
            # Generate with: openssl rand -base64 29 | tr -d "=+/" | cut -c1-32
            tokenSigningKey: '{REPLACE_KARGO_TOKEN_SIGNING_KEY}'

          argocd:
            urls:
              "": "https://argocd.{REPLACE_BASE_DOMAIN}"

          oidc:
            enabled: true
            # issuerURL points at the Dex sidecar, which brokers to vCP.
            # Dex handles the client secret and self-signed TLS cert so Kargo
            # does not need a clientSecret field or a TLS skip flag.
            issuerURL: "https://kargo.{REPLACE_BASE_DOMAIN}/dex"
            clientID: "kargo"
            additionalScopes:
              - email
              - profile
              - groups
            dex:
              enabled: true
              connectors:
                - type: oidc
                  id: vcp
                  name: vCluster Platform
                  config:
                    issuer: "https://{REPLACE_BASE_DOMAIN}/oidc"
                    clientID: "kargo"
                    clientSecret: "{REPLACE_KARGO_OIDC_SECRET}"
                    insecureSkipVerify: true
                    redirectURI: "https://kargo.{REPLACE_BASE_DOMAIN}/dex/callback"

          # TLS terminated by nginx ingress — disable pod-level TLS but tell
          # Kargo to still generate https:// URLs
          tls:
            enabled: false
            terminatedUpstream: false

          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              nginx.ingress.kubernetes.io/ssl-redirect: "false"
            tls:
              enabled: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Replace=true
    retry:
      limit: 5
      backoff:
        duration: 20s
        factor: 2
        maxDuration: 3m
