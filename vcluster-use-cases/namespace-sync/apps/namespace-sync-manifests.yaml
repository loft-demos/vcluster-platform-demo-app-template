apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespace-sync-manifests
  namespace: argocd
  labels:
    use-case.demos.vcluster.com: namespace-sync
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: '{REPLACE_GIT_BASE_URL}/{REPLACE_ORG_NAME}/{REPLACE_REPO_NAME}'
    targetRevision: HEAD
    path: vcluster-use-cases/namespace-sync/manifests
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true    
    retry:
      limit: 5
      backoff:
        duration: 5s 
        factor: 2 
        maxDuration: 1m
