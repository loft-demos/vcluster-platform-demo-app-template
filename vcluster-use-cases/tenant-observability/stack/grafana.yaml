apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: tenant-observability
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: tenant-prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.tenant-observability.svc.cluster.local:9090
        isDefault: true
        editable: false
      - name: Loki
        uid: tenant-loki
        type: loki
        access: proxy
        url: http://loki.tenant-observability.svc.cluster.local:3100
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: tenant-observability
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: tenant-observability
        orgId: 1
        folder: Tenant Observability
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/tenant-observability
---
