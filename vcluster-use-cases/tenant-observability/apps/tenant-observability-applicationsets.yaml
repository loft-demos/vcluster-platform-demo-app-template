apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tenant-observability-applicationsets
  namespace: argocd
  labels:
    demos.loft.sh: tenant-observability
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'http://forgejo-http.forgejo.svc.cluster.local:3000/vcluster-demos/vcp-gitops'
    targetRevision: HEAD
    path: vcluster-use-cases/tenant-observability/applicationsets
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
