kind: VirtualClusterTemplate
apiVersion: management.loft.sh/v1
metadata:
  name: tenant-observability-vcluster
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    loft.sh/hpm-enabled: "true"
    vcluster.com/template-icon: vcluster-box.svg
spec:
  displayName: Tenant Observability vCluster Template
  description: This template deploys a tenant-scoped observability stack inside each vCluster using Central HostPath Mapper for log collection.
  owner:
    team: loft-admins
  template:
    metadata:
      labels:
        loft.sh/import-argocd: 'true'
      annotations:
        sleepmode.loft.sh/ignore-user-agents: argo*
    instanceTemplate:
      metadata:
        annotations:
          loft.sh/custom-links: |-
            Grafana=https://grafana-{{ .Values.loft.virtualClusterName }}-{{ .Values.loft.clusterAnnotations.domainPrefix }}.{{ .Values.loft.clusterAnnotations.domain }}
            Prometheus=https://prometheus-{{ .Values.loft.virtualClusterName }}-{{ .Values.loft.clusterAnnotations.domainPrefix }}.{{ .Values.loft.clusterAnnotations.domain }}
    objects: |-
      ---
      apiVersion: v1
      kind: Namespace
      metadata:
        name: tenant-observability
      ---
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: tenant-observability-sample
        namespace: tenant-observability
      data:
        server.py: |
          import os
          import threading
          import time
          from http.server import BaseHTTPRequestHandler, HTTPServer

          cluster_name = os.getenv("CLUSTER_NAME", "unknown")
          project_name = os.getenv("PROJECT_NAME", "unknown")
          counter = 0
          started = time.time()
          lock = threading.Lock()

          class Handler(BaseHTTPRequestHandler):
              def log_message(self, format, *args):
                  return

              def do_GET(self):
                  if self.path == "/healthz":
                      self.send_response(200)
                      self.end_headers()
                      self.wfile.write(b"ok")
                      return

                  if self.path == "/metrics":
                      with lock:
                          current = counter
                      body = f"""# HELP tenant_observability_demo_messages_total Total demo log messages emitted
          # TYPE tenant_observability_demo_messages_total counter
          tenant_observability_demo_messages_total {current}
          # HELP tenant_observability_demo_info Static demo identity
          # TYPE tenant_observability_demo_info gauge
          tenant_observability_demo_info{{cluster="{cluster_name}",project="{project_name}"}} 1
          # HELP tenant_observability_demo_uptime_seconds Demo uptime in seconds
          # TYPE tenant_observability_demo_uptime_seconds gauge
          tenant_observability_demo_uptime_seconds {int(time.time() - started)}
          """
                      self.send_response(200)
                      self.send_header("Content-Type", "text/plain; version=0.0.4")
                      self.end_headers()
                      self.wfile.write(body.encode("utf-8"))
                      return

                  self.send_response(200)
                  self.end_headers()
                  self.wfile.write(
                      f"tenant-observability sample for {cluster_name}/{project_name}\n".encode("utf-8")
                  )

          def serve():
              server = HTTPServer(("0.0.0.0", 8080), Handler)
              server.serve_forever()

          threading.Thread(target=serve, daemon=True).start()

          while True:
              with lock:
                  counter += 1
                  message_id = counter
              print(
                  f'tenant-observability demo message cluster={cluster_name} project={project_name} id={message_id}',
                  flush=True,
              )
              time.sleep(5)
      ---
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: tenant-observability-sample
        namespace: tenant-observability
        labels:
          app.kubernetes.io/name: tenant-observability-sample
      spec:
        replicas: 1
        selector:
          matchLabels:
            app.kubernetes.io/name: tenant-observability-sample
        template:
          metadata:
            labels:
              app.kubernetes.io/name: tenant-observability-sample
          spec:
            containers:
              - name: sample
                image: python:3.12-alpine
                imagePullPolicy: IfNotPresent
                command:
                  - python
                  - /app/server.py
                env:
                  - name: CLUSTER_NAME
                    value: '{{ .Values.loft.virtualClusterName }}'
                  - name: PROJECT_NAME
                    value: '{{ .Values.loft.project }}'
                ports:
                  - name: http
                    containerPort: 8080
                readinessProbe:
                  httpGet:
                    path: /healthz
                    port: http
                livenessProbe:
                  httpGet:
                    path: /healthz
                    port: http
                  initialDelaySeconds: 10
                resources:
                  requests:
                    cpu: 10m
                    memory: 32Mi
                  limits:
                    cpu: 100m
                    memory: 128Mi
                volumeMounts:
                  - name: app
                    mountPath: /app
            volumes:
              - name: app
                configMap:
                  name: tenant-observability-sample
      ---
      apiVersion: v1
      kind: Service
      metadata:
        name: tenant-observability-sample
        namespace: tenant-observability
        labels:
          app.kubernetes.io/name: tenant-observability-sample
      spec:
        selector:
          app.kubernetes.io/name: tenant-observability-sample
        ports:
          - name: http
            port: 8080
            targetPort: http
      ---
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: loki-config
        namespace: tenant-observability
      data:
        loki.yaml: |
          auth_enabled: false
          server:
            http_listen_port: 3100
          common:
            path_prefix: /loki
            replication_factor: 1
            ring:
              kvstore:
                store: inmemory
            storage:
              filesystem:
                chunks_directory: /loki/chunks
                rules_directory: /loki/rules
          schema_config:
            configs:
              - from: 2024-01-01
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h
          analytics:
            reporting_enabled: false
          ruler:
            alertmanager_url: http://localhost:9093
      ---
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: loki
        namespace: tenant-observability
        labels:
          app.kubernetes.io/name: loki
      spec:
        replicas: 1
        selector:
          matchLabels:
            app.kubernetes.io/name: loki
        template:
          metadata:
            labels:
              app.kubernetes.io/name: loki
          spec:
            containers:
              - name: loki
                image: grafana/loki:latest
                imagePullPolicy: IfNotPresent
                args:
                  - -config.file=/etc/loki/loki.yaml
                ports:
                  - name: http
                    containerPort: 3100
                readinessProbe:
                  httpGet:
                    path: /ready
                    port: http
                livenessProbe:
                  httpGet:
                    path: /ready
                    port: http
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    cpu: 250m
                    memory: 512Mi
                volumeMounts:
                  - name: config
                    mountPath: /etc/loki
                  - name: storage
                    mountPath: /loki
            volumes:
              - name: config
                configMap:
                  name: loki-config
              - name: storage
                emptyDir: {}
      ---
      apiVersion: v1
      kind: Service
      metadata:
        name: loki
        namespace: tenant-observability
        labels:
          app.kubernetes.io/name: loki
      spec:
        selector:
          app.kubernetes.io/name: loki
        ports:
          - name: http
            port: 3100
            targetPort: http
      ---
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: prometheus-config
        namespace: tenant-observability
      data:
        prometheus.yml: |
          global:
            scrape_interval: 15s
            evaluation_interval: 15s
          scrape_configs:
            - job_name: prometheus
              static_configs:
                - targets:
                    - localhost:9090
            - job_name: tenant-observability-sample
              static_configs:
                - targets:
                    - tenant-observability-sample.tenant-observability.svc.cluster.local:8080
                  labels:
                    tenant_vcluster: '{{ .Values.loft.virtualClusterName }}'
                    tenant_project: '{{ .Values.loft.project }}'
      ---
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: prometheus
        namespace: tenant-observability
        labels:
          app.kubernetes.io/name: prometheus
      spec:
        replicas: 1
        selector:
          matchLabels:
            app.kubernetes.io/name: prometheus
        template:
          metadata:
            labels:
              app.kubernetes.io/name: prometheus
          spec:
            containers:
              - name: prometheus
                image: prom/prometheus:latest
                imagePullPolicy: IfNotPresent
                args:
                  - --config.file=/etc/prometheus/prometheus.yml
                  - --storage.tsdb.path=/prometheus
                  - --storage.tsdb.retention.time=12h
                  - --web.enable-lifecycle
                ports:
                  - name: http
                    containerPort: 9090
                readinessProbe:
                  httpGet:
                    path: /-/ready
                    port: http
                livenessProbe:
                  httpGet:
                    path: /-/healthy
                    port: http
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    cpu: 250m
                    memory: 512Mi
                volumeMounts:
                  - name: config
                    mountPath: /etc/prometheus
                  - name: data
                    mountPath: /prometheus
            volumes:
              - name: config
                configMap:
                  name: prometheus-config
              - name: data
                emptyDir: {}
      ---
      apiVersion: v1
      kind: Service
      metadata:
        name: prometheus
        namespace: tenant-observability
        labels:
          app.kubernetes.io/name: prometheus
      spec:
        selector:
          app.kubernetes.io/name: prometheus
        ports:
          - name: http
            port: 9090
            targetPort: http
      ---
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: grafana-datasources
        namespace: tenant-observability
      data:
        datasources.yaml: |
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              access: proxy
              url: http://prometheus.tenant-observability.svc.cluster.local:9090
              isDefault: true
              editable: false
            - name: Loki
              type: loki
              access: proxy
              url: http://loki.tenant-observability.svc.cluster.local:3100
              editable: false
      ---
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: grafana
        namespace: tenant-observability
        labels:
          app.kubernetes.io/name: grafana
      spec:
        replicas: 1
        selector:
          matchLabels:
            app.kubernetes.io/name: grafana
        template:
          metadata:
            labels:
              app.kubernetes.io/name: grafana
          spec:
            containers:
              - name: grafana
                image: grafana/grafana:latest
                imagePullPolicy: IfNotPresent
                env:
                  - name: GF_SERVER_ROOT_URL
                    value: 'https://grafana-{{ .Values.loft.virtualClusterName }}-{{ .Values.loft.clusterAnnotations.domainPrefix }}.{{ .Values.loft.clusterAnnotations.domain }}'
                  - name: GF_SECURITY_ADMIN_USER
                    value: admin
                  - name: GF_SECURITY_ADMIN_PASSWORD
                    value: admin
                  - name: GF_AUTH_ANONYMOUS_ENABLED
                    value: "true"
                  - name: GF_AUTH_ANONYMOUS_ORG_ROLE
                    value: Viewer
                  - name: GF_USERS_ALLOW_SIGN_UP
                    value: "false"
                ports:
                  - name: http
                    containerPort: 3000
                readinessProbe:
                  httpGet:
                    path: /api/health
                    port: http
                livenessProbe:
                  httpGet:
                    path: /api/health
                    port: http
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    cpu: 250m
                    memory: 512Mi
                volumeMounts:
                  - name: datasources
                    mountPath: /etc/grafana/provisioning/datasources
                  - name: storage
                    mountPath: /var/lib/grafana
            volumes:
              - name: datasources
                configMap:
                  name: grafana-datasources
              - name: storage
                emptyDir: {}
      ---
      apiVersion: v1
      kind: Service
      metadata:
        name: grafana
        namespace: tenant-observability
        labels:
          app.kubernetes.io/name: grafana
      spec:
        selector:
          app.kubernetes.io/name: grafana
        ports:
          - name: http
            port: 3000
            targetPort: http
      ---
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: promtail-config
        namespace: tenant-observability
      data:
        promtail.yaml: |
          server:
            http_listen_port: 3101
            grpc_listen_port: 0
          positions:
            filename: /run/promtail/positions.yaml
          clients:
            - url: http://loki.tenant-observability.svc.cluster.local:3100/loki/api/v1/push
          scrape_configs:
            - job_name: tenant-pod-logs
              pipeline_stages:
                - cri: {}
              static_configs:
                - targets:
                    - localhost
                  labels:
                    job: tenant-pod-logs
                    tenant_vcluster: '{{ .Values.loft.virtualClusterName }}'
                    tenant_project: '{{ .Values.loft.project }}'
                    host_node: ${NODE_NAME}
                    __path__: /var/log/pods/*/*/*.log
      ---
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        name: promtail
        namespace: tenant-observability
        labels:
          app.kubernetes.io/name: promtail
      spec:
        selector:
          matchLabels:
            app.kubernetes.io/name: promtail
        template:
          metadata:
            labels:
              app.kubernetes.io/name: promtail
          spec:
            tolerations:
              - operator: Exists
            containers:
              - name: promtail
                image: grafana/promtail:latest
                imagePullPolicy: IfNotPresent
                args:
                  - -config.file=/etc/promtail/promtail.yaml
                  - -config.expand-env=true
                env:
                  - name: NODE_NAME
                    valueFrom:
                      fieldRef:
                        fieldPath: spec.nodeName
                ports:
                  - name: http
                    containerPort: 3101
                resources:
                  requests:
                    cpu: 25m
                    memory: 64Mi
                  limits:
                    cpu: 150m
                    memory: 256Mi
                securityContext:
                  runAsUser: 0
                volumeMounts:
                  - name: config
                    mountPath: /etc/promtail
                  - name: positions
                    mountPath: /run/promtail
                  - name: pod-logs
                    mountPath: /var/log/pods
                    readOnly: true
            volumes:
              - name: config
                configMap:
                  name: promtail-config
              - name: positions
                emptyDir: {}
              - name: pod-logs
                hostPath:
                  path: /var/log/pods
                  type: DirectoryOrCreate
      ---
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: grafana
        namespace: tenant-observability
        annotations:
          kubernetes.io/ingress.class: nginx
      spec:
        rules:
          - host: grafana-{{ .Values.loft.virtualClusterName }}-{{ .Values.loft.clusterAnnotations.domainPrefix }}.{{ .Values.loft.clusterAnnotations.domain }}
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: grafana
                      port:
                        number: 3000
      ---
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: prometheus
        namespace: tenant-observability
        annotations:
          kubernetes.io/ingress.class: nginx
      spec:
        rules:
          - host: prometheus-{{ .Values.loft.virtualClusterName }}-{{ .Values.loft.clusterAnnotations.domainPrefix }}.{{ .Values.loft.clusterAnnotations.domain }}
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: prometheus
                      port:
                        number: 9090
    pro:
      enabled: true
    helmRelease:
      chart:
        version: 0.32.1
      values: |-
        sync:
          toHost:
            ingresses:
              enabled: true
        controlPlane:
          hostPathMapper:
            enabled: true
            central: true
    accessPoint:
      ingress: {}
    spaceTemplate:
      metadata: {}
  access:
    - verbs:
        - '*'
      subresources:
        - '*'
      users:
        - admin
